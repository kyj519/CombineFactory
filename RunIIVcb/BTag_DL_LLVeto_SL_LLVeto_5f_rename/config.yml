    type: "lnN"
    map_era: { "2018": 1.00439, "2017": 1.00378}

  - name: "lumi_uncorr_2016_"
    type: "lnN"
    map_era: { "2016preVFP": 1.00985, "2016postVFP": 1.00985 }

  - name: "lumi_corr_17_18_"
    type: "lnN"
    map_era: { "2018": 1.00626, "2017": 1.00582}

  - name: "lumi_corr_16_17_18_"
    type: "lnN"
    map_era: { "2018": 1.00414, "2017": 1.00369, "2016preVFP": 1.00742, "2016postVFP": 1.00742 }

  # - name: "lumi_13TeV_1516_l"
  #   type: "lnN"
  #   group: experimental
  #   map_era: { "2016preVFP": 1.0118, "2016postVFP": 1.0118 }

  # - name: "lumi_13TeV_151617_l"
  #   type: "lnN"
