# config.yml
meta:
  analysis: "WtoCB"
  outdir: "."
  aux_shapes: "."
  automcstats: 20 
  out_root_prefix: "Vcb_Template"

toggles:
  dd_mode: true
  btag_only: true
  symmetrized: false
  separate_dps: false
  use_4fs_scheme: false

# shape_symmetrization:
#   enabled: true
#   rules:
#     - nuisance: "top_pt_reweighting"
#       source: "Up"
#       mode: "mirror_nominal"
#       floor: 1.0e-5

# -----------------------------
# Definitions (핵심: SL/DL 구분을 여기서 정의)
# 스크립트는 이 리스트를 순회하며 Obs/Proc/Shape/Write를 수행함
# -----------------------------
definitions:
  - name: "dl"
    eras: ["2018", "2017", "2016preVFP", "2016postVFP"]
    channels: ["MM", "EE", "ME"]
    categories:
      - { id: 1, name: "Control_DL" }
    variable: "BvsC_3rd_4th_Jets_Unrolled"
    # 사용할 기본 프로세스 세트 이름 (아래 process_sets 참고)
    process_base_bkg: "dl_default"
    process_signal: "signal"
    # Shape 파일 경로 패턴
    shape_file: "{aux}/Vcb_DL_Histos_{era}_{channel}_processed.root"

  - name: "sl"
    eras: ["2018", "2017", "2016preVFP", "2016postVFP"]
    channels: ["Mu", "El"]
    categories:
      # Optional per-category rebin settings.
      # rebin_mode:
      #   error = leftover exists -> fail
      #   keep  = leftover stays as a smaller edge bin
      #   merge = leftover merges into the edge bin selected by direction
      #   drop  = leftover edge bins are discarded
      # rebin_direction:
      #   ltr = group bins from low edge to high edge; leftover lives on high edge
      #   rtl = group bins from high edge to low edge; leftover lives on low edge
      - { id: 2, name: "Control", rebin: 2, rebin_mode: "drop", rebin_direction: "rtl" }
      - { id: 3, name: "Signal" }
    variable: "Template_MVA_Score"
    process_base_bkg: "sl_default"
    process_signal: "signal"
    shape_file: "{aux}/Vcb_Histos_{era}_{channel}_processed.root"

# -----------------------------
# Process Sets & Rules
# -----------------------------
process_sets:
  signal: [WtoCB] # 예시, 실제 시그널 이름으로 변경
  ttbar_base: [JJ_TTLJ_2, BB_TTLJ_2, CC_TTLJ_2, JJ_TTLL, BB_TTLL, CC_TTLL, JJ_TTLJ_4, BB_TTLJ_4, CC_TTLJ_4]
  non_ttbar: [Others, ST]
  all_tt: ["@ttbar_base", "WtoCB"]
  
  
  # DL 기본 배경
  dl_default:
    - JJ_TTLJ_2
    - BB_TTLJ_2
    - CC_TTLJ_2
    - JJ_TTLL
    - BB_TTLL
    - CC_TTLL
    - JJ_TTLJ_4
    - BB_TTLJ_4
    - CC_TTLJ_4
    - Others
    - ST

  # SL 기본 배경
  sl_default:
    - JJ_TTLJ_2
    - BB_TTLJ_2
    - CC_TTLJ_2
    - JJ_TTLL
    - BB_TTLL
    - CC_TTLL
    - JJ_TTLJ_4
    - BB_TTLJ_4
    - CC_TTLJ_4
    - Others
    - ST


  # 규칙: 특정 조건에서 프로세스 추가/제거
  rules:
    - match: { region: "sl", channel: "Mu" }
      add: [QCD_Data_Driven]
    
    - match: { region: "sl", channel: "El" }
      add: [QCD_Data_Driven]
# -----------------------------
# Shapes extraction (C++와 동일)
# -----------------------------
variables:
  dl: "BvsC_3rd_4th_Jets_Unrolled"
  sl: "Template_MVA_Score"

shapes:
  - region: "dl"
    era: "@axes.era"
    channel: "@axes.channel_dl"
    category: "@categories.dl"
    file: "{aux}/Vcb_DL_Histos_{era}_{channel}_processed.root"
    nominal: "{category}/Nominal/$PROCESS/{var}"
    syst:    "{category}/$SYSTEMATIC/$PROCESS/{var}"

  - region: "sl"
    era: "@axes.era"
    channel: "@axes.channel_sl"
    category: "@categories.sl"
    file: "{aux}/Vcb_Histos_{era}_{channel}_processed.root"
    nominal: "{category}/Nominal/$PROCESS/{var}"
    syst:    "{category}/$SYSTEMATIC/$PROCESS/{var}"

# -----------------------------
# Systematics (C++ AddSyst 그대로)
# - "process_set"은 파이썬이 동적으로 제공:
#    all_tt = (ttbar(+dps if enabled) + signal)
#    ttbar  = (ttbar(+dps if enabled))
# -----------------------------
systematics:
  # tt xsec (all_tt)
  - name: "ttxsec_"
    type: "lnN"
    value: 1.0520
    group: theory
    select: { process_set: "all_tt" }

  - name: "stxsec_"
    type: "lnN"
    value: 1.2
    group: theory
    select: { process_in: ["ST"] }


