  - { name: "ttWNorm_",  type: "shape", group: theory, value: 1.0, select: { process_in: ["Others"] } }
  - { name: "ttHNorm_",  type: "shape", group: theory, value: 1.0, select: { process_in: ["Others"] } }
  - { name: "VVNorm_",   type: "shape", group: theory, value: 1.0, select: { process_in: ["Others"] } }
  - { name: "WJetsNorm_", type: "shape", group: theory, value: 1.0, select: { process_in: ["Others"] } }
  - { name: "DYJetsNorm_", type: "shape", group: theory, value: 1.0, select: { process_in: ["Others"] } }
  - { name: "QCD_Data_Driven_Norm_Mu_2016_",   type: "lnN", group: experimental, map_era: { "2016preVFP": 2.0, "2016postVFP": 2.0 }, select: { process_in: ["QCD_Data_Driven"], channel_in: ["Mu"]} }
  - { name: "QCD_Data_Driven_Norm_El_2016_",   type: "lnN", group: experimental, map_era: { "2016preVFP": 2.0, "2016postVFP": 2.0 }, select: { process_in: ["QCD_Data_Driven"], channel_in: ["El"]} }
  - { name: "QCD_Data_Driven_Norm_Mu_2017_",   type: "lnN", group: experimental, map_era: { "2017": 2.0 }, select: { process_in: ["QCD_Data_Driven"], channel_in: ["Mu"]} }
  - { name: "QCD_Data_Driven_Norm_El_2017_",   type: "lnN", group: experimental, map_era: { "2017": 2.0 }, select: { process_in: ["QCD_Data_Driven"], channel_in: ["El"]} }
  - { name: "QCD_Data_Driven_Norm_Mu_2018_",   type: "lnN", group: experimental, map_era: { "2018": 2.0 }, select: { process_in: ["QCD_Data_Driven"], channel_in: ["Mu"]} }
  - { name: "QCD_Data_Driven_Norm_El_2018_",   type: "lnN", group: experimental, map_era: { "2018": 2.0 }, select: { process_in: ["QCD_Data_Driven"], channel_in: ["El"]} }

# -----------------------------
# DD 모드 QCD TF (C++의 대량 AddSyst를 generator로 압축)
#  - process: Others
#  - era: 4개
#  - channel: Mu/El
#  - pt bin: 0,1,2
#  - eta bin: 0 (이름에만 들어감)
# -----------------------------
generators:
  - kind: "grid_syst"
    enabled: { toggle: "dd_mode", equals: true }
    process: "QCD_Data_Driven"
    name_template: "QCD_TF_Eta_Bin{eta}_Pt_Bin{pt}_$ERA_$CHANNEL_"
    type: "shape"
    value: 1.0
    group: experimental
    grid:
      era: ["2016preVFP", "2016postVFP", "2017", "2018"]
      channel: ["Mu", "El"]
      eta: [0]
      pt: [0, 1, 2]

# -----------------------------
# WriteFinalLine() (datacard 끝 append)
#  - use_4fs_scheme 토글에 따라 ttjj 수식/파라미터가 달라짐
# -----------------------------
finalize:
  - kind: "append_lines"
    enabled: true
    group: experimental
    lines:
      - "ttbbXsec rateParam * BB_* 1.0"
      - "ttccXsec rateParam * CC_* 1.0"

  - kind: "append_lines"
    enabled: false
    channels: ["Mu", "El"]
    group: experimental
    lines:
      - "QCD_Data_Driven_Norm rateParam * QCD_Data_Driven 1.0 [0.0,10.0]"

  - kind: "append_lines"
    enabled: { toggle: "use_4fs_scheme", equals: false }
    group: theory
    lines:
      - "ttbbXsec param 1.36 0.243"
      - "ttccXsec param 1.11 0.212"
  - kind: "append_lines"
    enabled: { toggle: "use_4fs_scheme", equals: false }
    lines:
      - "ttjjXsec rateParam * JJ_* (453.63-@0*10.45013377-@1*35.08476781)/(453.63-10.45013377-35.08476781) ttbbXsec,ttccXsec"

  - kind: "append_lines"
    enabled: { toggle: "use_4fs_scheme", equals: true }
    group: theory
    lines:
      - "ttbbXsec param 1.0 0.243"
      - "ttccXsec param 1.11 0.212"
      - "ttjjXsec rateParam * JJ_* (453.63-@0*11.88129415-@1*35.08476781)/(453.63-11.88129415-35.08476781) ttbbXsec,ttccXsec"

# -----------------------------
# Post-build systematic renaming
# - Applied after SR_SL_DL.txt is combined and before shape_to_lnN / text2workspace.
# - The rename step updates both datacard nuisance names and matching ROOT shape keys.
# - `from` / `to` accept simple templates such as $ERA, $CHANNEL, {eta}, {pt}.
# - When a placeholder touches other characters, use braces, e.g. "PU_Jet_Veto_{ERA}_".
# - `official_ref` is optional but, when set, should match a key in systematics_master.yml.
# - Browse official references with:
#     python3 ../../python/rename_systematics.py --config config.yml --list-master
# -----------------------------
renaming:
  enabled: true
  master_file: "./systematics_master.yml"
  strict_master_validation: true
  check_names_output: "./systematics_TOP26001.yml"
  rules:
    # Legacy names intentionally left unchanged for now:
    # - lumi_13TeV_151617_l

    # - from: "lumi_13TeV_1516_l"
    #   to: "lumi_13TeV_1516_l"
    #   check_names:
    #     description: "legacy luminosity uncertainty correlated across the 2016 preVFP and postVFP data-taking periods."
    # - from: "lumi_13TeV_151617_l"
    #   to: "lumi_13TeV_151617_l"
    #   check_names:
    #     description: "legacy luminosity uncertainty correlated across the 2016 preVFP, 2016 postVFP, and 2017 data-taking periods."
    # - from: "lumi_13TeV_15161718_l"
    #   to: "lumi_13TeV_15161718_l"
    #   check_names:
    #     description: "legacy luminosity uncertainty correlated across the full 2016-2018 Run 2 data-taking periods."

    - from: lumi_corr_16_17_18_
      to: lumi_13TeV_correlated
      official_ref: lumi_13TeV_correlated

    - from: lumi_corr_17_18_
      to: lumi_13TeV_1718
      official_ref: lumi_13TeV_1718

    - from: lumi_uncorr_2016_
      to: lumi_2016
      official_ref: lumi_(2016|2017|2018)

    - from: lumi_uncorr_2017_
      to: lumi_2017
      official_ref: lumi_(2016|2017|2018)  
       
    - from: lumi_uncorr_2018_
      to: lumi_2018
      official_ref: lumi_(2016|2017|2018)

    - from: "Prefire_2016preVFP_"
      to: "CMS_l1_ecal_prefiring_2016"
      official_ref: "CMS_l1_ecal_prefiring_(2016|2017)"
    - from: "Prefire_2016postVFP_"
