vars:
  # Keep late postfit controls independent from stage 30.
  stage_late_postfit_enabled: "true"
  # Run late postfit only after long-running analysis stages are done.
  # If you disable one of these stages, override this list accordingly.
  late_postfit_needs: "s40_10_impact_morphed_plot,s50_07_siginj_plot,s60_06_gof_plot"
  # FitDiagnostics shape export drops channels with the histsum/no-wrapper workspace,
  # so stage 80 builds a plotting-only workspace with the default wrappers enabled.
  postfit_plot_workspace: "SR_SL_DL_plot.root"
  postfit_plot_workspace_opts: "--channel-masks --for-fits --optimize-simpdf-constraints=cms --X-pack-asympows"
  postfit_extra_opts: "--cminDefaultMinimizerStrategy 1 --robustFit 1 --robustHesse 1 --rMin -1 --rMax 5 --cminFallbackAlgo Minuit2,Simplex,1:0.1 --cminPreScan --saveShapes --saveWithUncertainties --saveWorkspace --X-rtd MINIMIZER_MaxCalls=9999999"
  postfit_job_opts: ""
  pull_output_prefix: "pulls"
  pull_cms_label: "Work in progress"
  postfit_plot_outdir: "./plots"
  postfit_bkg_keys: "QCD_Data_Driven,Others,ST,JJ_TTLL,CC_TTLL,BB_TTLL,JJ_TTLJ,CC_TTLJ,BB_TTLJ"

steps:
  - name: s80_00_postfit_workspace
    enabled: "${stage_late_postfit_enabled}"
    needs: "s20_03_shape_to_lnn,${late_postfit_needs}"
    cmd: "text2workspace.py ./${datacard_txt} -o ${postfit_plot_workspace} -P HiggsAnalysis.CombinedLimit.VcbModel:brVcbModel ${postfit_plot_workspace_opts}"

  # UNBLIND: full fit to observed data across all regions (no signal masking).
  - name: s80_01_postfit_fitdiag
    enabled: "${stage_late_postfit_enabled}"
    needs: ["s80_00_postfit_workspace"]
    cmd: "combineTool.py -M FitDiagnostics -d ${postfit_plot_workspace} ${postfit_extra_opts} ${postfit_job_opts} -n ${pull_tag_postfit}"

  - name: s80_02_postfit_plot
    enabled: "${stage_late_postfit_enabled}"
    needs: ["s80_01_postfit_fitdiag"]
    cmd: "python3 ${cf_python}/draw_prefit_postfit.py fitDiagnostics${pull_tag_postfit}.root --modes all --outdir ${postfit_plot_outdir} --bkg-keys \"${postfit_bkg_keys}\""
