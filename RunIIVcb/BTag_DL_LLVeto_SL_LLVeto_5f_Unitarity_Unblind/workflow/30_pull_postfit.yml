vars:
  stage_pull_postfit_enabled: "true"
  pull_fast_extra_opts: "--cminDefaultMinimizerStrategy 1 --robustFit 1 --robustHesse 1 --rMin 0 --rMax 5 --cminFallbackAlgo Minuit2,Simplex,1:0.1"
  pull_region_extra_opts: "--cminDefaultMinimizerStrategy 1 --robustFit 1 --robustHesse 1 --rMin 0 --rMax 5 --cminFallbackAlgo Minuit2,Simplex,1:0.1 --cminPreScan"
  postfit_extra_opts: "--cminDefaultMinimizerStrategy 1 --robustFit 1 --robustHesse 1 --rMin -1 --rMax 5 --cminFallbackAlgo Minuit2,Simplex,1:0.1 --cminPreScan --saveShapes --saveWithUncertainties --saveWorkspace"
  postfit_job_opts: ""
  pull_output_prefix: "pulls"
  pull_cms_label: "Work in progress"
  postfit_plot_outdir: "./plots"
  postfit_bkg_keys: "QCD_Data_Driven,Others,ST,JJ_TTLL,CC_TTLL,BB_TTLL,JJ_TTLJ,CC_TTLJ,BB_TTLJ"
  # CR-only diagnostic fits still mask signal regions.
  pull_mask_crdl_expr: "rgx{mask_Signal_.*}=1,rgx{mask_Control_2.*}=1"
  pull_mask_crsl_expr: "rgx{mask_Signal_.*}=1,rgx{mask_Control_DL.*}=1"
  # UNBLIND: SR-only fit to observed data with r floating (no Asimov, no r fixation).
  pull_mask_sr_expr: "rgx{mask_Control_DL.*}=1,rgx{mask_Control_2.*}=1"
  pull_tag_crdl: ".pull.DLOnly"
  pull_tag_crsl: ".pull.SLOnly"
  pull_tag_sr: ".pull.ObsSROnly"
  pull_output_prefix_crdl: "pulls_crdl"
  pull_output_prefix_crsl: "pulls_crsl"
  pull_output_prefix_sr: "pulls_sr_obs"

steps:
  # UNBLIND: fast fit to ALL regions (no signal masking) using observed data.
  - name: s30_01_pull_fit_fast
    enabled: "${stage_pull_postfit_enabled}"
    needs: ["s20_04_workspace_linear"]
    cmd: "combineTool.py -M FitDiagnostics -d ${workspace_linear} ${pull_fast_extra_opts} -n ${pull_tag_fast} --freezeParameters 'rgx{prop_binSignal_.*}' -v 2"

  - name: s30_02_pull_plot
    enabled: "${stage_pull_postfit_enabled}"
    needs: ["s30_01_pull_fit_fast"]
    cmd: "python3 ${cf_python}/diffNuisances.py fitDiagnostics${pull_tag_fast}.root --ws ${workspace_linear} --out ${pull_output_prefix} --cms-label \"${pull_cms_label}\""

  - name: s30_03_pull_plot_const
    enabled: "${stage_pull_postfit_enabled}"
    needs: ["s30_01_pull_fit_fast"]
    cmd: "python3 ${cf_python}/diffNuisances.py fitDiagnostics${pull_tag_fast}.root --ws ${workspace_linear} --out ${pull_output_prefix}_const --cms-label \"${pull_cms_label}\" --sort constraint"

  - name: s30_04_pull_fit_crdl
    enabled: "${stage_pull_postfit_enabled}"
    needs: ["s20_04_workspace_linear"]
    cmd: "combineTool.py -M FitDiagnostics -d ${workspace_linear} ${pull_region_extra_opts} --setParameters '${pull_mask_crdl_expr}' -n ${pull_tag_crdl} -v 2"

  - name: s30_05_pull_plot_crdl
    enabled: "${stage_pull_postfit_enabled}"
    needs: ["s30_04_pull_fit_crdl"]
    cmd: "python3 ${cf_python}/diffNuisances.py fitDiagnostics${pull_tag_crdl}.root --ws ${workspace_linear} --out ${pull_output_prefix_crdl} --cms-label \"${pull_cms_label}\""

  - name: s30_06_pull_plot_const_crdl
    enabled: "${stage_pull_postfit_enabled}"
    needs: ["s30_04_pull_fit_crdl"]
    cmd: "python3 ${cf_python}/diffNuisances.py fitDiagnostics${pull_tag_crdl}.root --ws ${workspace_linear} --out ${pull_output_prefix_crdl}_const --cms-label \"${pull_cms_label}\" --sort constraint"

  - name: s30_07_pull_fit_crsl
    enabled: "${stage_pull_postfit_enabled}"
    needs: ["s20_04_workspace_linear"]
    cmd: "combineTool.py -M FitDiagnostics -d ${workspace_linear} ${pull_region_extra_opts} --setParameters '${pull_mask_crsl_expr}' -n ${pull_tag_crsl} -v 2"

  - name: s30_08_pull_plot_crsl
    enabled: "${stage_pull_postfit_enabled}"
    needs: ["s30_07_pull_fit_crsl"]
    cmd: "python3 ${cf_python}/diffNuisances.py fitDiagnostics${pull_tag_crsl}.root --ws ${workspace_linear} --out ${pull_output_prefix_crsl} --cms-label \"${pull_cms_label}\""

  - name: s30_09_pull_plot_const_crsl
    enabled: "${stage_pull_postfit_enabled}"
    needs: ["s30_07_pull_fit_crsl"]
    cmd: "python3 ${cf_python}/diffNuisances.py fitDiagnostics${pull_tag_crsl}.root --ws ${workspace_linear} --out ${pull_output_prefix_crsl}_const --cms-label \"${pull_cms_label}\" --sort constraint"

  # UNBLIND: SR-only fit to observed data (no -t -1, r floating).
  - name: s30_10_pull_fit_sr
    enabled: "${stage_pull_postfit_enabled}"
    needs: ["s20_04_workspace_linear"]
    cmd: "combineTool.py -M FitDiagnostics -d ${workspace_linear} ${pull_region_extra_opts} --setParameters '${pull_mask_sr_expr}' -n ${pull_tag_sr} -v 2"

  - name: s30_11_pull_plot_sr
    enabled: "${stage_pull_postfit_enabled}"
    needs: ["s30_10_pull_fit_sr"]
    cmd: "python3 ${cf_python}/diffNuisances.py fitDiagnostics${pull_tag_sr}.root --ws ${workspace_linear} --out ${pull_output_prefix_sr} --cms-label \"${pull_cms_label}\""

  - name: s30_12_pull_plot_const_sr
    enabled: "${stage_pull_postfit_enabled}"
    needs: ["s30_10_pull_fit_sr"]
    cmd: "python3 ${cf_python}/diffNuisances.py fitDiagnostics${pull_tag_sr}.root --ws ${workspace_linear} --out ${pull_output_prefix_sr}_const --cms-label \"${pull_cms_label}\" --sort constraint"
