# config.yml
meta:
  analysis: "WtoCB"
  outdir: "."
  aux_shapes: "."
  automcstats: 5.0
  out_root_prefix: "Vcb_Template"

toggles:
  dd_mode: true
  btag_only: false 
  symmetrized: false
  separate_dps: false
  use_4fs_scheme: false

# -----------------------------
# Definitions (핵심: SL/DL 구분을 여기서 정의)
# 스크립트는 이 리스트를 순회하며 Obs/Proc/Shape/Write를 수행함
# -----------------------------
definitions:
  - name: "dl"
    eras: ["2018", "2017", "2016preVFP", "2016postVFP"]
    channels: ["MM", "EE", "ME"]
    categories:
      - { id: 1, name: "Control_DL" }
    variable: "BvsC_3rd_4th_Jets_Unrolled"
    # 사용할 기본 프로세스 세트 이름 (아래 process_sets 참고)
    process_base_bkg: "dl_default"
    process_signal: "signal"
    # Shape 파일 경로 패턴
    shape_file: "{aux}/Vcb_DL_Histos_{era}_{channel}_processed.root"

# -----------------------------
# Process Sets & Rules
# -----------------------------
process_sets:
  signal: [WtoCB] # 예시, 실제 시그널 이름으로 변경
  ttbar_base: [JJ_TTLJ_2, BB_TTLJ_2, CC_TTLJ_2, JJ_TTLL, BB_TTLL, CC_TTLL, JJ_TTLJ_4, BB_TTLJ_4, CC_TTLJ_4]
  non_ttbar: [Others, ST]
  all_tt: ["@ttbar_base", "WtoCB"]
  
  
  # DL 기본 배경
  dl_default:
    - JJ_TTLJ_2
    - BB_TTLJ_2
    - CC_TTLJ_2
    - JJ_TTLL
    - BB_TTLL
    - CC_TTLL
    - JJ_TTLJ_4
    - BB_TTLJ_4
    - CC_TTLJ_4
    - Others
    - ST

  # SL 기본 배경
  sl_default:
    - JJ_TTLJ_2
    - BB_TTLJ_2
    - CC_TTLJ_2
    - JJ_TTLL
    - BB_TTLL
    - CC_TTLL
    - JJ_TTLJ_4
    - BB_TTLJ_4
    - CC_TTLJ_4
    - Others
    - ST


  # 규칙: 특정 조건에서 프로세스 추가/제거
  rules:
    - match: { region: "sl", channel: "Mu" }
      add: [QCD_Data_Driven]
    
    - match: { region: "sl", channel: "El" }
      add: [QCD_Data_Driven]
# -----------------------------
# Shapes extraction (C++와 동일)
# -----------------------------
variables:
  dl: "BvsC_3rd_4th_Jets_Unrolled"
  sl: "Template_MVA_Score"

shapes:
  - region: "dl"
    era: "@axes.era"
    channel: "@axes.channel_dl"
    category: "@categories.dl"
    file: "{aux}/Vcb_DL_Histos_{era}_{channel}_processed.root"
    nominal: "{category}/Nominal/$PROCESS/{var}"
    syst:    "{category}/$SYSTEMATIC/$PROCESS/{var}"

  - region: "sl"
    era: "@axes.era"
    channel: "@axes.channel_sl"
    category: "@categories.sl"
    file: "{aux}/Vcb_Histos_{era}_{channel}_processed.root"
    nominal: "{category}/Nominal/$PROCESS/{var}"
    syst:    "{category}/$SYSTEMATIC/$PROCESS/{var}"

# -----------------------------
# Systematics (C++ AddSyst 그대로)
# - "process_set"은 파이썬이 동적으로 제공:
#    all_tt = (ttbar(+dps if enabled) + signal)
#    ttbar  = (ttbar(+dps if enabled))
# -----------------------------
systematics:
  # tt xsec (all_tt)
  - name: "ttxsec_"
    type: "lnN"
    value: 1.0520
    group: theory
    select: { process_set: "all_tt" }

  # Lumi
  # - name: "lumi_uncorr_$ERA_"
  #   type: "lnN"
  #   map_era: { "2018": 1.015, "2017": 1.020 }

  # - name: "lumi_uncorr_2016_"
  #   type: "lnN"
  #   map_era: { "2016preVFP": 1.01, "2016postVFP": 1.01 }

  # - name: "lumi_corr_17_18_"
  #   type: "lnN"
  #   map_era: { "2018": 1.002, "2017": 1.006 }

  # - name: "lumi_corr_16_17_18_"
  #   type: "lnN"
  #   map_era: { "2018": 1.020, "2017": 1.009, "2016preVFP": 1.006, "2016postVFP": 1.006 }

  - name: "lumi_13TeV_1516_l"
    type: "lnN"
    group: experimental
    map_era: { "2016preVFP": 1.0118, "2016postVFP": 1.0118 }

  - name: "lumi_13TeV_151617_l"
    type: "lnN"
    group: experimental
    map_era: { "2016preVFP": 1.0004, "2016postVFP": 1.0004, "2017": 1.0055}

  - name: "lumi_13TeV_15161718_l"
    type: "lnN"
    group: experimental
    map_era: { "2016preVFP": 1.0035, "2016postVFP": 1.0035, "2017": 1.0061, "2018": 1.0084}




  # Prefire / PU / PU jet veto
  - name: "Prefire_$ERA_"
    type: "shape"
    value: 1.0
    group: experimental

  - name: "Pileup_"
    type: "shape"
    value: 1.0
    group: experimental

  - name: "PU_Jet_Veto_$ERA_"
    type: "shape"
    value: 1.0
    group: experimental

  # Trig / Lep SF
  - name: "Mu_Trig_$ERA_"
    type: "shape"
    value: 1.0
    group: experimental
    select: { channel_in: ["MM", "ME", "Mu"] }

  - name: "El_Trig_$ERA_"
    type: "shape"
    value: 1.0
    group: experimental
    select: { channel_in: ["EE", "ME", "El"] }

  - name: "Mu_Id_"
    type: "shape"
    value: 1.0
    group: experimental
    select: { channel_in: ["MM", "ME", "Mu"] }

  - name: "Mu_Iso_"
    type: "shape"
    value: 1.0
    group: experimental
    select: { channel_in: ["MM", "ME", "Mu"] }

  - name: "El_Id_"
    type: "shape"
    value: 1.0
    group: experimental
    select: { channel_in: ["EE", "ME", "El"] }

  - name: "El_Reco_"
    type: "shape"
    value: 1.0
    group: experimental
    select: { channel_in: ["EE", "ME", "El"] }

  # Jet energy breakdown (C++에서 모두 AddSyst 한 그대로)
  - { name: "Jet_En_Absolute2016_", type: "shape", group: experimental, map_era: { "2016preVFP": 1.0, "2016postVFP": 1.0 } }
  - { name: "Jet_En_Absolute2017_", type: "shape", group: experimental, map_era: { "2017": 1.0 } }
  - { name: "Jet_En_Absolute2018_", type: "shape", group: experimental, map_era: { "2018": 1.0 } }
  - { name: "Jet_En_Absolute_",     type: "shape", group: experimental, value: 1.0 }

  - { name: "Jet_En_BBEC12016_", type: "shape", group: experimental, map_era: { "2016preVFP": 1.0, "2016postVFP": 1.0 } }
  - { name: "Jet_En_BBEC12017_", type: "shape", group: experimental, map_era: { "2017": 1.0 } }
  - { name: "Jet_En_BBEC12018_", type: "shape", group: experimental, map_era: { "2018": 1.0 } }
  - { name: "Jet_En_BBEC1_",     type: "shape", group: experimental, value: 1.0 }

  - { name: "Jet_En_EC22016_", type: "shape", group: experimental, map_era: { "2016preVFP": 1.0, "2016postVFP": 1.0 } }
  - { name: "Jet_En_EC22017_", type: "shape", group: experimental, map_era: { "2017": 1.0 } }
  - { name: "Jet_En_EC22018_", type: "shape", group: experimental, map_era: { "2018": 1.0 } }
  - { name: "Jet_En_EC2_",     type: "shape", group: experimental, value: 1.0 }

  - { name: "Jet_En_FlavorQCD_", type: "shape", group: experimental, value: 1.0 }

  - { name: "Jet_En_HF2016_", type: "shape", group: experimental, map_era: { "2016preVFP": 1.0, "2016postVFP": 1.0 } }
  - { name: "Jet_En_HF2017_", type: "shape", group: experimental, map_era: { "2017": 1.0 } }
  - { name: "Jet_En_HF2018_", type: "shape", group: experimental, map_era: { "2018": 1.0 } }
  - { name: "Jet_En_HF_",     type: "shape", group: experimental, value: 1.0 }

  - { name: "Jet_En_RelativeBal_", type: "shape", group: experimental, value: 1.0 }
  - { name: "Jet_En_RelativeSample2016_", type: "shape", group: experimental, map_era: { "2016preVFP": 1.0, "2016postVFP": 1.0 } }
  - { name: "Jet_En_RelativeSample2017_", type: "shape", group: experimental, map_era: { "2017": 1.0 } }
  - { name: "Jet_En_RelativeSample2018_", type: "shape", group: experimental, map_era: { "2018": 1.0 } }

  - name: "Jet_Res_$ERA_"
    type: "shape"
    value: 1.0
    group: experimental

  # BTag-only vs CTag branch (C++ if(bTagOnly) else)
  - name: "B_Tag_LFStats1_$ERA_"
    type: "shape"
    value: 1.0
    group: flav_tagging
    when: { btag_only: true }

  - name: "B_Tag_LFStats2_$ERA_"
    type: "shape"
    value: 1.0
    group: flav_tagging
    when: { btag_only: true }

  - name: "B_Tag_HFStats1_$ERA_"
    type: "shape"
    value: 1.0
    group: flav_tagging
    when: { btag_only: true }

  - name: "B_Tag_HFStats2_$ERA_"
    type: "shape"
    value: 1.0
    group: flav_tagging
    when: { btag_only: true }

  - { name: "B_Tag_CFErr1_", type: "shape", group: flav_tagging, value: 1.0, when: { btag_only: true } }
  - { name: "B_Tag_CFErr2_", type: "shape", group: flav_tagging, value: 1.0, when: { btag_only: true } }
  - { name: "B_Tag_HF_",     type: "shape", group: flav_tagging, value: 1.0, when: { btag_only: true } }
  - { name: "B_Tag_LF_",     type: "shape", group: flav_tagging, value: 1.0, when: { btag_only: true } }

  - { name: "C_Tag_Extrap_", type: "shape", group: flav_tagging, value: 1.0, when: { btag_only: false } }
  - { name: "C_Tag_Interp_", type: "shape", group: flav_tagging, value: 1.0, when: { btag_only: false } }
  - { name: "C_Tag_XSec_Br_Unc_DYJets_B_", type: "shape", group: flav_tagging, value: 1.0, when: { btag_only: false } }
  - { name: "C_Tag_XSec_Br_Unc_DYJets_C_", type: "shape", group: flav_tagging, value: 1.0, when: { btag_only: false } }
  - { name: "C_Tag_XSec_Br_Unc_WJets_C_",  type: "shape", group: flav_tagging, value: 1.0, when: { btag_only: false } }

  - name: "C_Tag_Stat_$ERA_"
    type: "shape"
    value: 1.0
    group: flav_tagging
    when: { btag_only: false }

  # PDF
  - { name: "PDF_As_",        type: "shape", group: theory, value: 1.0 }
  - { name: "PDF_Error_Set_", type: "shape", group: theory, value: 1.0 }

  # Scales (TT / ST de-correlated)
  - name: "MuR_TT_"
    type: "shape"
    value: 1.0
    group: theory
    select: { process_set: "all_tt" }

  - name: "MuF_TT_"
    type: "shape"
    value: 1.0
    group: theory
    select: { process_set: "all_tt" }

  - name: "MuR_ST_"
    type: "shape"
    value: 1.0
    group: theory
    select: { process_in: ["ST"] }

  - name: "MuF_ST_"
    type: "shape"
    value: 1.0
    group: theory
    select: { process_in: ["ST"] }

  # PS
  - { name: "FSR_", type: "shape", group: theory, value: 1.0 }

  - name: "ISR_TT_"
    type: "shape"
    value: 1.0
    group: theory
    select: { process_set: "all_tt" }

  - name: "ISR_ST_"
    type: "shape"
    value: 1.0
    group: theory
    select: { process_in: ["ST"] }

  # UE / CP5 / hdamp / top pt / mtop (all_tt)
  - { name: "UE_$ERA_", type: "shape", group: theory, value: 1.0 }

  - name: "CP5_"
    type: "shape"
    value: 1.0
    group: theory
    select: { process_set: "all_tt" }

  - name: "hdamp_"
    type: "shape"
    value: 1.0
    group: theory
    select: { process_set: "all_tt" }

  - name: "Top_Pt_MVA_Reweight_"
    type: "shape"
    value: 1.0
    group: theory
    select: { process_set: "all_tt" }

  - name: "mtop_"
    type: "shape"
    value: 1.0
    group: theory
    select: { process_set: "all_tt" }

  # bbDPS norm (only when separate_dps)
  - name: "bbDPSNorm_"
    type: "lnN"
    value: 1.5
    group: theory
    when: { separate_dps: true }
    select: { process_in: ["BB_TTLJ_DPS_2", "BB_TTLJ_DPS_4", "BB_TTLL_DPS"] }

  # Minor bkg norms (원 코드 그대로 두되, 실제로 프로세스 없으면 자동으로 무시됨)
  - { name: "ttVNorm_", type: "lnN", group: theory, value: 1.2, select: { process_in: ["ttV"] } }
  - { name: "VVNorm_",  type: "lnN", group: theory, value: 1.2, select: { process_in: ["VV"] } }

  - { name: "DYJetsNorm_", type: "lnN", group: theory, value: 1.2, select: { process_in: ["DYJets"] } }
  - { name: "VJetsNorm_",  type: "lnN", group: theory, value: 1.05, select: { process_in: ["VJets"] } }

  # bfrag / color reconnection / erdOn (all_tt)
  - { name: "B_Frag_MVA_", type: "shape", group: theory, value: 1.0, select: { process_set: "all_tt" } }
  - { name: "CR1_",       type: "shape", group: theory, value: 1.0, select: { process_set: "all_tt" } }
  - { name: "CR2_",       type: "shape", group: theory, value: 1.0, select: { process_set: "all_tt" } }
  - { name: "erdOn_",     type: "shape", group: theory, value: 1.0, select: { process_set: "all_tt" } }

  # 5FS vs 4FS shape (use_4fs_scheme == false 일 때만)
  - name: "TTBB_5FS_VS_4FS_"
    type: "shape"
    value: 1.0
    group: theory
    when: { use_4fs_scheme: false }
    select: { process_set: "ttbar" }

  # Others에 붙는 개별 minor shapes (C++ 마지막 부분)
  - { name: "ttZNorm_",  type: "shape", group: theory, value: 1.0, select: { process_in: ["Others"] } }
  - { name: "ttWNorm_",  type: "shape", group: theory, value: 1.0, select: { process_in: ["Others"] } }
  - { name: "ttHNorm_",  type: "shape", group: theory, value: 1.0, select: { process_in: ["Others"] } }
  - { name: "VVNorm_",   type: "shape", group: theory, value: 1.0, select: { process_in: ["Others"] } }
  - { name: "WJetsNorm_", type: "shape", group: theory, value: 1.0, select: { process_in: ["Others"] } }
  - { name: "DYJetsNorm_", type: "shape", group: theory, value: 1.0, select: { process_in: ["Others"] } }
  - { name: "QCD_Data_Driven_Norm_Mu_2016_",   type: "lnN", group: experimental, map_era: { "2016preVFP": 2.0, "2016postVFP": 2.0 }, select: { process_in: ["QCD_Data_Driven"], channel_in: ["Mu"]} }
  - { name: "QCD_Data_Driven_Norm_El_2016_",   type: "lnN", group: experimental, map_era: { "2016preVFP": 2.0, "2016postVFP": 2.0 }, select: { process_in: ["QCD_Data_Driven"], channel_in: ["El"]} }
  - { name: "QCD_Data_Driven_Norm_Mu_2017_",   type: "lnN", group: experimental, map_era: { "2017": 2.0 }, select: { process_in: ["QCD_Data_Driven"], channel_in: ["Mu"]} }
  - { name: "QCD_Data_Driven_Norm_El_2017_",   type: "lnN", group: experimental, map_era: { "2017": 2.0 }, select: { process_in: ["QCD_Data_Driven"], channel_in: ["El"]} }
  - { name: "QCD_Data_Driven_Norm_Mu_2018_",   type: "lnN", group: experimental, map_era: { "2018": 2.0 }, select: { process_in: ["QCD_Data_Driven"], channel_in: ["Mu"]} }
  - { name: "QCD_Data_Driven_Norm_El_2018_",   type: "lnN", group: experimental, map_era: { "2018": 2.0 }, select: { process_in: ["QCD_Data_Driven"], channel_in: ["El"]} }

# -----------------------------
# DD 모드 QCD TF (C++의 대량 AddSyst를 generator로 압축)
#  - process: Others
#  - era: 4개
#  - channel: Mu/El
#  - pt bin: 0,1,2
#  - eta bin: 0 (이름에만 들어감)
# -----------------------------
generators:
  - kind: "grid_syst"
    enabled: { toggle: "dd_mode", equals: true }
    process: "Others"
    name_template: "QCD_TF_Eta_Bin{eta}_Pt_Bin{pt}_$ERA_$CHANNEL_"
    type: "shape"
    value: 1.0
    group: experimental
    grid:
      era: ["2016preVFP", "2016postVFP", "2017", "2018"]
      channel: ["Mu", "El"]
      eta: [0]
      pt: [0, 1, 2]

# -----------------------------
# WriteFinalLine() (datacard 끝 append)
#  - use_4fs_scheme 토글에 따라 ttjj 수식/파라미터가 달라짐
# -----------------------------
finalize:
  - kind: "append_lines"
    enabled: true
    group: experimental
    lines:
      - "ttbbXsec rateParam * BB_* 1.0"
      - "ttccXsec rateParam * CC_* 1.0"

  - kind: "append_lines"
    enabled: false
    channels: ["Mu", "El"]
    group: experimental
    lines:
      - "QCD_Data_Driven_Norm rateParam * QCD_Data_Driven 1.0 [0.0,10.0]"

  - kind: "append_lines"
    enabled: { toggle: "use_4fs_scheme", equals: false }
    group: theory
    lines:
      - "ttbbXsec param 1.36 0.243"
      - "ttccXsec param 1.11 0.212"
  - kind: "append_lines"
    enabled: { toggle: "use_4fs_scheme", equals: false }
    lines:
      - "ttjjXsec rateParam * JJ_* (453.63-@0*10.45013377-@1*35.08476781)/(453.63-10.45013377-35.08476781) ttbbXsec,ttccXsec"

  - kind: "append_lines"
    enabled: { toggle: "use_4fs_scheme", equals: true }
    group: theory
    lines:
      - "ttbbXsec param 1.0 0.243"
      - "ttccXsec param 1.11 0.212"
      - "ttjjXsec rateParam * JJ_* (453.63-@0*11.88129415-@1*35.08476781)/(453.63-11.88129415-35.08476781) ttbbXsec,ttccXsec"
