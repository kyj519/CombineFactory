luminosity:
    lumi_[78]TeV:
        description: 'Luminosity uncertainty on Run 1  pp data taking, per centre-of-mass energy.'
    lumi_13TeV:
        description: 'luminosity uncertainty on 13 TeV pp data averaged over 2016-2018 data taking.'
    lumi_(2016|2017|2018):         
        description: 'portion of luminosity uncertainty on 13TeV pp data in a given year which is uncorrelated with other Run 2 years.'
