vars:
  stage_breakdown_enabled: "true"
  breakdown_task_no_freeze: "htt_no_freeze"
  breakdown_task_freeze_all: "htt_freeze_all"

steps:
  - name: s70_01_breakdown_prepare_dirs
    enabled: "${stage_breakdown_enabled}"
    needs: ["s30_01_pull_fit_fast"]
    cmd: "mkdir -p breakdown/asimov breakdown/morphed"

  - name: s70_02_breakdown_asimov_submit
    enabled: "${stage_breakdown_enabled}"
    needs: ["s70_01_breakdown_prepare_dirs"]
    workdir: "breakdown/asimov"
    cmd: "${cf_scripts}/breakdown_runII.sh ../../${workspace_linear}"

  - name: s70_03_breakdown_asimov_wait
    enabled: "${stage_breakdown_enabled}"
    needs: ["s70_02_breakdown_asimov_submit"]
    workdir: "breakdown/asimov"
    cmd: |
      if ! command -v condor_q >/dev/null 2>&1; then
        echo "condor_q not found; skip waiting for breakdown(asimov) batches"
        exit 0
      fi
      for batch in "${breakdown_task_no_freeze}" "${breakdown_task_freeze_all}"; do
        while condor_q "$USER" -af BatchName 2>/dev/null | grep -Fxq "$batch"; do
          echo "[wait] $batch"
          sleep ${wait_poll_seconds}
        done
      done


