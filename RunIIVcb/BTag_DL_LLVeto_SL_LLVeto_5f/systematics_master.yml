luminosity:
    lumi_[78]TeV:
        description: 'Luminosity uncertainty on Run 1  pp data taking, per centre-of-mass energy.'
        add_db:
            pog: LUM
            uncertainty_set: Lumi_Run1
            era: Run1

    lumi_13TeV_correlated:
        description: 'portion of luminosity uncertainty on 13TeV pp data which is correlated between 2016, 2017, and 2018 data taking.'
        add_db: &run2lumi
            pog: LUM
            uncertainty_set: Lumi
            era: ['2016preVFP','2016postVFP','2017','2018']
    lumi_2016:
        description: 'portion of luminosity uncertainty on 13TeV pp data in a given year which is uncorrelated with other Run 2 years.'
        add_db:
            <<: *run2lumi
            era: ['2016preVFP','2016postVFP']

    lumi_2017:
        description: 'portion of luminosity uncertainty on 13TeV pp data in a given year which is uncorrelated with other Run 2 years.'
        add_db:
            <<: *run2lumi
            era: '2017'

    lumi_2018:
        description: 'portion of luminosity uncertainty on 13TeV pp data in a given year which is uncorrelated with other Run 2 years.'
        add_db:
            <<: *run2lumi
            era: '2018'

    lumi_13TeV_1718:
        description: 'portion of luminosity uncertainty on 13TeV pp data which is correlated between 2017, and 2018 data taking.'
        add_db:
            <<: *run2lumi
            era: ['2017', '2018']

    lumi_13p6TeV_2022:
        description: 'luminosity uncertainty for the 2022 data taking period, from http://cds.cern.ch/record/2890833'
        add_db:
            pog: LUM
            uncertainty_set: Lumi
            era: '2022'
            recommended: False

    lumi_13p6TeV_2023:
        description: 'interim luminosity uncertainty for the 2023 data taking period, from https://cds.cern.ch/record/2904808'    
        add_db:
            pog: LUM
            uncertainty_set: Lumi 
            era: '2023'
            recommended: False    

    lumi_13p6TeV_2024:
        description: 'interim luminosity uncertainty for the 2024 data taking period [no CDS yet]'    
        add_db:
            pog: LUM
            uncertainty_set: Lumi 
            era: '2024'
            recommended: False

    lumi_13p6TeV_2223:
        description: 'interim luminosity uncertainty for the 2022 and 2023 data taking periods, correlated between the two periods'
        add_db:
            pog: LUM
            uncertainty_set: Lumi
            era: [ '2022', '2023' ]

    lumi_13p6TeV_2324:
        description: 'interim luminosity uncertainty for the 2023 and 2024 data taking periods, correlated between the two periods'    
        add_db:
            pog: LUM
            uncertainty_set: Lumi 
            era: [ '2023', '2024' ]

    lumi_13p6TeV_222324:
        description: 'interim luminosity uncertainty for the 2022, 2023, and 2024 data taking period, correlated across the three periods'    
        add_db:
            pog: LUM
            uncertainty_set: Lumi 
            era: [ '2022', '2023', '2024' ]
                  



pileup:
    CMS_pileup:
        description: 'pileup uncertainty from the limited knowledge of the pp minimum bias cross section.'
