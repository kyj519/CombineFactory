# config.yml  (C++ 코드와 1:1로 매칭되는 형태)
meta:
  analysis: "WtoCB"              # cb.AddObservations/AddProcesses에 쓰는 analysis 이름
  outdir: "."                    # C++는 현재 디렉토리에 txt/root를 생성
  aux_shapes: "/data6/Users/yeonjoon/SKNANOAnalyzer_NanoV15/SKNanoOutput"  # -a/--aux 로 바뀌는 값 (기본은 pwd)
  automcstats: 5.0
  out_root_prefix: "Vcb_Template"  # C++의 ROOT 출력 prefix와 동일하게 쓰고 싶을 때(파이썬에서 사용)

toggles:
  dd_mode: false         # -D / "DD"
  btag_only: true        # -b
  symmetrized: false     # -s
  separate_dps: false    # --dps
  use_4fs_scheme: false  # -4 / --4FS
  has_5fs_vs_4fs_shape: true  # this sample has no TTBB_5FS_VS_4FS_ templates

# -----------------------------
# Definitions (Python builder input)
# -----------------------------
definitions:
  - name: "sl"
    eras: ["2024"]
    channels: ["Mu", "El"]
    categories:
      - { id: 1, name: "Inclusive" }
    variable: "Template_MVA_Score"
    process_base_bkg: "default"
    process_signal: "signal"
    shape_file: "{aux}/Vcb_SL/{channel}_OTv3_TriJet/{era}/{era}.root"
    nominal: "{channel}/{category}/Central/$PROCESS/{var}"
    syst: "{channel}/{category}/$SYSTEMATIC/$PROCESS/{var}"

  - name: "dl"
    eras: ["2024"]
    channels: ["MM", "ME", "EE"]
    categories:
      - { id: 1, name: "Inclusive" }
    variable: "Jet34_Cat_Unrolled_Probb_Merged"
    process_base_bkg: "default"
    process_signal: "signal"
    shape_file: "{aux}/Vcb_DL/{channel}_OTv3/{era}/{era}.root"
    nominal: "{channel}/{category}/Central/$PROCESS/{var}"
    syst: "{channel}/{category}/$SYSTEMATIC/$PROCESS/{var}"

# -----------------------------
# Process sets
# -----------------------------
process_sets:
  signal: [TTLJ_Vcb]

  ttbar_base:
    - TTLJ+B
    - TTLJ+C
    - TTLJ+LF
    - TTLL+B
    - TTLL+C
    - TTLL+LF

  non_ttbar: [ST, ttV, VV, VJets]

  ttbar: ["@ttbar_base"]
  all_tt: ["@ttbar", "@signal"]

  default: ["@ttbar", "@non_ttbar"]

# -----------------------------
# Systematics (C++ AddSyst 그대로)
# - "process_set"은 파이썬이 동적으로 제공:
#    all_tt = (ttbar(+dps if enabled) + signal)
#    ttbar  = (ttbar(+dps if enabled))
# -----------------------------
systematics:
  - name: "ttxsec_"
    type: "lnN"
    value: 1.0517
    select: { process_set: "all_tt" }

  - name: "lumi_guess_2024_"
    type: "lnN"
    value: 1.0167

  - name: "Pileup_"
    type: "shape"
    value: 1.0

  - name: "Mu_Trig_"
    type: "shape"
    value: 1.0
    select: { channel_in: ["Mu", "MM", "ME"] }

  - name: "El_Trig_"
    type: "shape"
    value: 1.0
    select: { channel_in: ["El", "EE", "ME"] }

  - name: "Mu_ID_"
    type: "shape"
    value: 1.0
    select: { channel_in: ["Mu", "MM", "ME"] }

  - name: "Mu_Iso_"
    type: "shape"
    value: 1.0
    select: { channel_in: ["Mu", "MM", "ME"] }

  - name: "El_ID_"
    type: "shape"
    value: 1.0
    select: { channel_in: ["El", "EE", "ME"] }

  - name: "El_Reco_"
    type: "shape"
    value: 1.0
    select: { channel_in: ["El", "EE", "ME"] }

  - name: "Jet_En_"
    type: "shape"
    value: 1.0

  # - name: "Jet_Res_2024_"
