# -----------------------------
# WriteFinalLine() (datacard 끝 append)
# -----------------------------
finalize:
  - kind: "append_lines"
    enabled: true
    lines:
      - "rate_ttbbXsec rateParam * *+B 1.0 [0,3]"
      - "rate_ttccXsec rateParam * *+C 1.0 [0,3]"
      - "rate_ttlfXsec rateParam * *+LF (503.72-(1.9318789461316312+9.366400824705387)*@0-37.970763131237995*@1)/(454.45242221792506) rate_ttbbXsec,rate_ttccXsec"
      - "nuisance edit rename ST * ISR_ ISRST_ "
      - "nuisance edit rename ST * MuF_ MuFST_ "
      - "nuisance edit rename ST * MuR_ MuRST_ "
